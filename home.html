<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href = "style.css" rel = "stylesheet">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <div class = 'heading'>
        <h2>Rock, Paper and Scissors</h2>
    </div>


    <div class = "images">
        <div class = 'rock'>
            <button class = "choice" data-choice = "rock">
            <img src = "rock.svg" alt = "rock">
            </button>
        </div> 
        <div class = 'paper'>
            <button class="choice" data-choice="paper">
            <img src = "paper.svg" alt = "paper">
            </button>
        </div> 
        <div class = 'scissors'>
            <button class = "choice" data-choice="scissors">
            <img src = "scissors.png" alt = "scissors">
            </button>
        </div> 
    </div>


    <div class = "compchoice">
        <p style="color: aliceblue;">Computer's choice:</p>
        <div class = "imgg">
            <img src = "" alt = "comp choice" class = "compimg">
        </div>
    </div>

    <script src = "logic.js"></script>
   
</body>
</html>
